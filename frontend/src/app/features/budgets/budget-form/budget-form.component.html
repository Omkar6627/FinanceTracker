<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start"><ion-button (click)="dismiss()">Cancel</ion-button></ion-buttons>
    <ion-title>New budget</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="bf-content">
  <form [formGroup]="form" class="bf-form">
    <div class="block">
      <label>Category</label>
      <div *ngIf="loading" class="cat-grid">
        <ion-skeleton-text *ngFor="let i of [1,2,3,4,5,6]" animated style="width: 80px; height: 80px; border-radius: 14px;"></ion-skeleton-text>
      </div>
      <div *ngIf="!loading" class="cat-grid">
        <button type="button" class="cat-tile" *ngFor="let c of categories"
                [class.active]="form.controls.categoryId.value === c.id"
                [style.--cat-color]="c.color"
                (click)="form.controls.categoryId.setValue(c.id)">
          <span class="cat-dot"><ion-icon [name]="c.icon"></ion-icon></span>
          <span class="cat-name">{{ c.name }}</span>
        </button>
      </div>
    </div>

    <div class="block">
      <label>Limit</label>
      <div class="amount-input">
        <input type="number" inputmode="decimal" step="0.01" placeholder="0.00"
               formControlName="limitAmount" />
      </div>
    </div>

    <div class="block">
      <label>Period</label>
      <div class="period-toggle">
        <button type="button" class="seg" *ngFor="let p of ['Weekly','Monthly']"
                [class.active]="form.controls.period.value === p"
                (click)="form.controls.period.setValue($any(p))">{{ p }}</button>
      </div>
    </div>
  </form>
</ion-content>

<ion-footer class="ion-no-border">
  <ion-toolbar>
    <div class="footer-action">
      <ion-button expand="block" class="save-btn" (click)="save()" [disabled]="saving">
        <ion-spinner *ngIf="saving" name="dots"></ion-spinner>
        <span *ngIf="!saving">Create budget</span>
      </ion-button>
    </div>
  </ion-toolbar>
</ion-footer>
