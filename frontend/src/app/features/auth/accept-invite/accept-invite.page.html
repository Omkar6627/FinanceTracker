<ion-content class="auth-content" [fullscreen]="true">
  <div class="auth-shell">
    <div class="auth-card">
      <div class="auth-header">
        <div class="logo-bubble">
          <ion-icon name="people-outline"></ion-icon>
        </div>
        <h1>Join your team</h1>
        <p>You've been invited. Set up your account to get started.</p>
      </div>

      <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form">
        <div class="form-row">
          <label>Full name</label>
          <div class="input-wrap">
            <ion-icon name="person-outline"></ion-icon>
            <input type="text" formControlName="fullName" autocomplete="name" placeholder="Alex Morgan" />
          </div>
        </div>

        <div class="form-row">
          <label>Password</label>
          <div class="input-wrap">
            <ion-icon name="lock-closed-outline"></ion-icon>
            <input type="password" formControlName="password" autocomplete="new-password" placeholder="At least 8 characters" />
          </div>
        </div>

        <ion-button expand="block" type="submit" class="submit-btn"
                    [disabled]="form.invalid || loading">
          {{ loading ? 'Joining…' : 'Accept invitation' }}
        </ion-button>

        <div class="auth-footer">
          Already have an account? <a routerLink="/login/login">Sign in</a>
        </div>
      </form>
    </div>
  </div>
</ion-content>
