<ion-tabs>
  <ion-router-outlet></ion-router-outlet>

  <ion-tab-bar slot="bottom" class="ft-tab-bar">
    <ion-tab-button tab="dashboard" routerLink="/app/dashboard">
      <ion-icon name="home-outline"></ion-icon>
      <ion-label>Home</ion-label>
    </ion-tab-button>
    <ion-tab-button tab="transactions" routerLink="/app/transactions">
      <ion-icon name="list-outline"></ion-icon>
      <ion-label>Activity</ion-label>
    </ion-tab-button>
    <ion-tab-button tab="budgets" routerLink="/app/budgets">
      <ion-icon name="pie-chart-outline"></ion-icon>
      <ion-label>Budgets</ion-label>
    </ion-tab-button>
    <ion-tab-button tab="reports" routerLink="/app/reports">
      <ion-icon name="stats-chart-outline"></ion-icon>
      <ion-label>Reports</ion-label>
    </ion-tab-button>
    <ion-tab-button tab="settings" routerLink="/app/settings">
      <ion-icon name="settings-outline"></ion-icon>
      <ion-label>Settings</ion-label>
    </ion-tab-button>
  </ion-tab-bar>
</ion-tabs>
